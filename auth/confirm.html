<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookoBBQ — redirection</title>
  <script>
    // Migration : la page de confirmation a migré sur cookobbq.com.
    // Crucial : préserver le hash de l'URL (Supabase y met les tokens
    // access_token / refresh_token / type=signup). Sans cette
    // préservation, la confirmation côté serveur reste OK mais l'user
    // ne voit pas le message succès branded.
    window.location.replace(
      'https://cookobbq.com/auth/confirm.html' + window.location.hash
    );
  </script>
  <meta http-equiv="refresh" content="1; url=https://cookobbq.com/auth/confirm.html" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px 24px; max-width: 560px; margin: 0 auto; color: #1F1A17; line-height: 1.5; }
    a { color: #D2502A; }
  </style>
</head>
<body>
  <h1>CookoBBQ</h1>
  <p>Redirection vers la nouvelle page de confirmation…</p>
  <p>Si rien ne se passe, <a id="link" href="https://cookobbq.com/auth/confirm.html">clique ici</a>.</p>
  <script>
    // Lien manuel avec le hash préservé
    document.getElementById('link').href =
      'https://cookobbq.com/auth/confirm.html' + window.location.hash;
  </script>
</body>
</html>
