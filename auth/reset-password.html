<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Réinitialiser ton mot de passe — CookoBBQ</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* Quelques overrides locaux pour le formulaire */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--paper-3);
      border-radius: 10px;
      padding: 12px;
      transition: border-color 0.15s ease;
    }
    .field input:focus {
      outline: none;
      border-color: var(--braise);
    }
    button.cta {
      width: 100%;
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      background: var(--braise);
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    button.cta:hover { background: var(--braise-deep); }
    button.cta:disabled {
      background: var(--paper-3);
      color: var(--ink-faint);
      cursor: not-allowed;
    }
    .feedback {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .feedback.success {
      background: rgba(92, 140, 107, 0.12);
      border-left: 3px solid #5C8C6B;
      color: var(--ink);
    }
    .feedback.error {
      background: rgba(184, 64, 54, 0.10);
      border-left: 3px solid #B84036;
      color: var(--ink);
    }
    .hidden { display: none; }
    .small {
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <span class="brand-flame" aria-hidden="true"></span>
      <span class="brand-name">Cooko<span class="bbq">BBQ</span></span>
    </header>

    <h1>Nouveau mot de passe</h1>
    <p class="subtitle">Choisis un nouveau mot de passe pour ton compte.</p>

    <div id="loading" class="feedback">
      Validation du lien…
    </div>

    <div id="error" class="feedback error hidden"></div>
    <div id="success" class="feedback success hidden"></div>

    <form id="form" class="hidden" autocomplete="off">
      <div class="field">
        <label for="password">Nouveau mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          minlength="6"
          required
          placeholder="6 caractères minimum"
        />
      </div>

      <div class="field">
        <label for="confirm">Confirmation</label>
        <input
          type="password"
          id="confirm"
          name="confirm"
          autocomplete="new-password"
          minlength="6"
          required
          placeholder="Retape le mot de passe"
        />
      </div>

      <button type="submit" id="submit" class="cta">Mettre à jour</button>
    </form>

    <p class="small">
      Une fois mis à jour, ouvre l'application CookoBBQ et connecte-toi
      avec ton nouveau mot de passe.
    </p>

    <div class="footer">
      <a href="../">← CookoBBQ</a>
      <a href="../legal/privacy.html">Confidentialité</a>
      <a href="mailto:contact@cookobbq.com">contact@cookobbq.com</a>
    </div>
  </div>

  <!--
    supabase-js depuis CDN. On charge la version v2 (alignée sur le
    SDK utilisé côté app). Le client est créé avec la publishable key
    publique (sécurité gérée par RLS côté DB, cf. lib/supabase.ts).
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    (function () {
      const SUPABASE_URL = 'https://yngkzdiipkfgubetowst.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_6za0IJVizrFod3Isz-2WmA_q9Cz3793';

      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const formEl = document.getElementById('form');
      const passwordEl = document.getElementById('password');
      const confirmEl = document.getElementById('confirm');
      const submitEl = document.getElementById('submit');

      function showError(msg) {
        loadingEl.classList.add('hidden');
        formEl.classList.add('hidden');
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
      }

      function showForm() {
        loadingEl.classList.add('hidden');
        formEl.classList.remove('hidden');
      }

      function showSuccess(msg) {
        loadingEl.classList.add('hidden');
        formEl.classList.add('hidden');
        successEl.textContent = msg;
        successEl.classList.remove('hidden');
      }

      // Supabase renvoie les tokens dans le fragment d'URL (#access_token=…)
      // pour ne PAS qu'ils transitent en clair dans les logs serveur. On
      // doit parser nous-mêmes.
      function parseHash() {
        const hash = window.location.hash.replace(/^#/, '');
        const params = new URLSearchParams(hash);
        return {
          accessToken: params.get('access_token'),
          refreshToken: params.get('refresh_token'),
          type: params.get('type'),
          error: params.get('error_description') || params.get('error'),
        };
      }

      const { accessToken, refreshToken, type, error } = parseHash();

      if (error) {
        showError(
          'Le lien est invalide ou a expiré. Demande un nouveau lien depuis l\'application CookoBBQ.'
        );
        return;
      }

      if (!accessToken || type !== 'recovery') {
        showError(
          'Lien de réinitialisation manquant ou incomplet. Ouvre directement le lien reçu par email.'
        );
        return;
      }

      // Création du client + restauration de la session depuis les
      // tokens reçus. Une fois la session active, on peut appeler
      // updateUser pour changer le mot de passe.
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: false },
      });

      client.auth
        .setSession({
          access_token: accessToken,
          refresh_token: refreshToken || '',
        })
        .then(({ error: sessionError }) => {
          if (sessionError) {
            showError(
              'Impossible de valider le lien : ' + sessionError.message
            );
            return;
          }
          showForm();
        })
        .catch((err) => {
          showError('Erreur inattendue : ' + (err && err.message ? err.message : err));
        });

      formEl.addEventListener('submit', function (ev) {
        ev.preventDefault();
        const newPwd = passwordEl.value;
        const confirmPwd = confirmEl.value;

        if (newPwd.length < 6) {
          showError('Le mot de passe doit faire au moins 6 caractères.');
          formEl.classList.remove('hidden');
          return;
        }
        if (newPwd !== confirmPwd) {
          // On affiche l'erreur sans masquer le form (pour que l'user
          // puisse corriger).
          errorEl.textContent = 'Les deux mots de passe ne correspondent pas.';
          errorEl.classList.remove('hidden');
          return;
        }

        submitEl.disabled = true;
        submitEl.textContent = 'Mise à jour…';
        errorEl.classList.add('hidden');

        client.auth
          .updateUser({ password: newPwd })
          .then(({ error: updateError }) => {
            if (updateError) {
              errorEl.textContent =
                'Échec de la mise à jour : ' + updateError.message;
              errorEl.classList.remove('hidden');
              submitEl.disabled = false;
              submitEl.textContent = 'Mettre à jour';
              return;
            }
            showSuccess(
              'Mot de passe mis à jour ✓ Ouvre l\'app CookoBBQ et connecte-toi avec ton nouveau mot de passe.'
            );
          })
          .catch((err) => {
            errorEl.textContent =
              'Erreur inattendue : ' + (err && err.message ? err.message : err);
            errorEl.classList.remove('hidden');
            submitEl.disabled = false;
            submitEl.textContent = 'Mettre à jour';
          });
      });
    })();
  </script>
</body>
</html>
